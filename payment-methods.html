<!-- /payment-methods.html -->
<!doctype html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>결제수단 관리 - VET EX</title>
  <link rel="icon" href="/assets/img/favicon.png" />
  <link rel="stylesheet" href="/assets/css/reset.css" />
  <link rel="stylesheet" href="/assets/css/theme.css" />
  <link rel="stylesheet" href="/assets/css/app.css" />
</head>
<body class="dark">
  <div class="page">
    <div id="site-header"></div>

    <main class="site-main">
      <div class="main-wrap">

        <section class="hero">
          <div class="block-title">결제수단 관리</div>
          <div class="block-text" style="margin-top:8px;">
            판매 광고에 표시할 결제수단을 등록하세요. 구매자가 송금 시 참고합니다.
          </div>
        </section>

        <div class="hr"></div>

        <!-- 지갑 연결 상태 -->
        <div class="panel" style="padding:14px; margin-bottom:14px;">
          <div style="display:flex; justify-content:space-between; align-items:center; flex-wrap:wrap; gap:10px;">
            <div>
              <span class="muted" style="font-size:13px;">지갑: </span>
              <span id="walletAddr" class="mono" style="font-size:13px;">미연결</span>
            </div>
            <button class="btn" id="btnConnect">지갑 연결</button>
          </div>
        </div>

        <div id="note" class="note" style="display:none; margin-bottom:14px; padding:10px 14px;"></div>

        <!-- 내 결제수단 목록 -->
        <section class="panel" style="padding:16px; margin-bottom:16px;">
          <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:12px;">
            <div class="block-title" style="font-size:18px;">내 결제수단</div>
            <button class="btn primary" id="btnAdd">+ 추가</button>
          </div>
          <div id="pmList">
            <div class="muted" style="font-size:13px; text-align:center; padding:28px 0;">
              지갑을 연결하면 결제수단을 관리할 수 있습니다.
            </div>
          </div>
        </section>

        <!-- 추가/수정 폼 (초기 숨김) -->
        <section class="panel" style="padding:16px; display:none;" id="pmForm">
          <div class="block-title" style="font-size:18px; margin-bottom:14px;" id="formTitle">결제수단 추가</div>

          <div class="form-grid">
            <div class="full">
              <div class="k">결제 종류 *</div>
              <select class="input" id="pmType">
                <option value="BANK_KR">🏦 한국 계좌이체 (KRW)</option>
                <option value="BANK_VN">🏦 베트남 계좌이체 (VND)</option>
                <option value="CASH">💵 현금 직거래</option>
                <option value="QR">📱 QR 결제</option>
              </select>
            </div>

            <div id="bankNameWrap">
              <div class="k">은행명 *</div>
              <input class="input" id="pmBankName" placeholder="예: 국민은행 / Vietcombank" />
            </div>

            <div id="accountNameWrap">
              <div class="k">예금주명</div>
              <input class="input" id="pmAccountName" placeholder="예: 홍길동 / Nguyen Van A" />
            </div>

            <div id="accountNumberWrap" class="full">
              <div class="k">계좌번호 / 전화번호</div>
              <input class="input mono" id="pmAccountNumber" placeholder="예: 110-123-456789 / 0912-345-678" />
            </div>

            <div class="full">
              <div class="k">비고/안내 (선택)</div>
              <input class="input" id="pmNote" placeholder="예: 입금 시 이름+금액 메모 부탁드립니다" />
            </div>
          </div>

          <input type="hidden" id="editingId" value="" />

          <div style="display:flex; gap:10px; margin-top:14px; justify-content:flex-end; flex-wrap:wrap;">
            <button class="btn secondary" id="btnCancelForm">취소</button>
            <button class="btn primary" id="btnSavePm">저장</button>
          </div>
        </section>

      </div>
    </main>

    <div id="site-footer"></div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/ethers@6.14.0/dist/ethers.umd.min.js"></script>
  <script src="/assets/js/secrets.js"></script>
  <script src="/assets/js/config.js"></script>
  <script type="module" src="/assets/js/firebase.js"></script>
  <script src="/assets/js/partials.js"></script>
  <script type="module">
    await window.loadPartials();
    await import("/assets/js/header-wallet.js");
  </script>
  <script type="module" src="/assets/js/pages/payment-methods.js"></script>
</body>
</html>
