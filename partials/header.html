<!-- /partials/header.html -->
<header class="top-header">
  <style>
    .hdr-row{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:12px;
    }
    .hdr-left{
      display:flex;
      align-items:center;
      gap:18px;
      min-width:0;
    }
    .hdr-nav{
      display:flex;
      gap:16px;
      font-size:14px;
      margin-left:18px;
    }
    .hdr-nav a{
      text-decoration:none;
      color:var(--muted);
    }
    .hdr-nav a:hover{ color:var(--text); }

    .hdr-right{
      display:flex;
      align-items:center;
      gap:10px;
    }

    .hdr-burger{
      width:40px;
      height:40px;
      border-radius:12px;
      border:1px solid var(--line);
      background: linear-gradient(180deg, rgba(255,255,255,0.06), rgba(255,255,255,0.02));
      color:var(--text);
      display:none;
      align-items:center;
      justify-content:center;
      cursor:pointer;
      user-select:none;
    }
    .hdr-burger:active{ transform: translateY(1px); }
    .hdr-burger svg{ width:22px; height:22px; }

    .hdr-menu{
      display:none;
      position:absolute;
      left:0; right:0;
      top:100%;
      z-index:201;
      margin-top:4px;
      border:1px solid var(--line);
      border-radius:16px;
      background: linear-gradient(180deg, rgba(30,30,50,0.97), rgba(20,20,40,0.97));
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      box-shadow: 0 16px 48px rgba(0,0,0,0.45);
      overflow:hidden;
    }
    .hdr-menu a{
      display:block;
      padding:12px 14px;
      text-decoration:none;
      color:var(--text);
      border-top:1px solid rgba(255,255,255,0.08);
    }
    .hdr-menu a:first-child{ border-top:none; }
    .hdr-menu a:hover{ background: rgba(255,255,255,0.05); }
    .hdr-menu.open{ display:block; }

    @media (max-width: 820px){
      .hdr-nav{ display:none; }
      .hdr-burger{ display:inline-flex; }
      #hdrBalances{ display:none !important; }
    }

    @media (max-width: 420px){
      .hdr-left{ gap:12px; }
    }
  </style>

  <div class="layout-wrap" style="padding:14px 0;">
    <div style="position:relative;">

      <div class="hdr-row">
        <div class="hdr-left">
          <a href="index.html" style="display:inline-flex; align-items:center;">
            <img src="assets/img/vet.png" alt="VET DAO" style="height:34px; display:block;" />
          </a>

          <nav class="hdr-nav" aria-label="Primary">
            <a href="/index.html">거래소</a>
            <a href="/sell.html">광고등록</a>
            <a href="/my-trades.html">내 거래</a>
            <a href="/payment-methods.html">결제수단</a>
            <a href="/profile.html">프로필</a>
            <a href="/admin.html" id="navAdmin" style="display:none;">관리자</a>
          </nav>
        </div>

        <div class="hdr-right">
          <div id="hdrBalances" class="pill" style="display:none; gap:12px; align-items:center;">
            <span id="hdrAddr" class="mono" style="font-size:12px;"></span>
            <span style="width:1px;height:14px;background:var(--line);display:inline-block;"></span>
            <span style="font-size:12px; color:var(--muted);">HEX</span>
            <span id="hdrHex" class="mono" style="font-size:12px; color:var(--text);">-</span>
            <span style="font-size:12px; color:var(--muted);">VET</span>
            <span id="hdrVet" class="mono" style="font-size:12px; color:var(--text);">-</span>
          </div>

          <button class="btn" id="btnGoogleLogin"
            title="Jump 수탁지갑 소유자 전용 로그인입니다."
            style="display:inline-flex;align-items:center;gap:6px;font-size:13px;padding:0 12px;position:relative;">
            <svg width="14" height="14" viewBox="0 0 24 24" style="flex-shrink:0;">
              <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
              <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
              <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/>
              <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
            </svg>
            구글 로그인
            <span style="font-size:10px;background:rgba(249,115,22,0.2);color:#f97316;border-radius:4px;padding:1px 4px;line-height:1.4;">수탁</span>
          </button>

          <button class="btn" id="hdrConnect">지갑 연결</button>

          <button class="hdr-burger" id="hdrBurger" aria-label="메뉴 열기" aria-expanded="false">
            <svg viewBox="0 0 24 24" fill="none" aria-hidden="true" xmlns="http://www.w3.org/2000/svg">
              <path d="M4 7H20" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
              <path d="M4 12H20" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
              <path d="M4 17H20" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
            </svg>
          </button>
        </div>
      </div>

      <nav class="hdr-menu" id="hdrMenu" aria-label="Mobile Menu">
        <a href="/index.html">거래소</a>
        <a href="/sell.html">광고등록</a>
        <a href="/my-trades.html">내 거래</a>
        <a href="/payment-methods.html">결제수단</a>
        <a href="/profile.html">프로필</a>
        <a href="/admin.html" id="navAdminMobile" style="display:none;">관리자</a>
      </nav>

      <div id="hdrNote" class="note" style="display:none; margin-top:10px;"></div>
    </div>
  </div>
</header>
