<!doctype html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>프로필 - VET EX</title>
  <link rel="icon" href="/assets/img/favicon.png" />
  <link rel="stylesheet" href="/assets/css/reset.css" />
  <link rel="stylesheet" href="/assets/css/theme.css" />
  <link rel="stylesheet" href="/assets/css/app.css" />
</head>
<body class="dark">
  <div class="page">
    <div id="site-header"></div>

    <main class="site-main">
      <div class="main-wrap">

        <section class="hero">
          <div class="block-title">프로필</div>
          <div class="block-text" style="margin-top:8px;">
            판매등록을 하려면 SNS(카카오톡 또는 텔레그램) 1개 이상을 등록해야 합니다.
          </div>
        </section>

        <div class="hr"></div>

        <!-- 지갑 상태 -->
        <div class="panel" style="padding:14px; margin-bottom:14px;">
          <div style="display:flex; justify-content:space-between; align-items:center; flex-wrap:wrap; gap:10px;">
            <div>
              <span class="muted" style="font-size:13px;">지갑: </span>
              <span id="myAddr" class="mono" style="font-size:13px;">미연결</span>
            </div>
            <button class="btn" id="btnConnect">지갑 연결</button>
          </div>
        </div>

        <div id="note" class="note" style="display:none; margin-bottom:14px; padding:10px 14px;"></div>

        <!-- SNS 섹션 -->
        <section class="panel" style="padding:16px; margin-bottom:14px;">
          <div class="block-title" style="font-size:18px; margin-bottom:14px;">SNS 연락처</div>
          <div class="muted" style="font-size:12px; margin-bottom:14px;">
            카카오톡 또는 텔레그램 중 1개 이상 필수 · 블록체인 트랜잭션 없음
          </div>

          <div class="form-grid">
            <div>
              <div class="k">카카오톡 ID</div>
              <input id="kakaoId" class="input" type="text" placeholder="예: herix" />
            </div>
            <div>
              <div class="k">텔레그램 ID</div>
              <input id="telegramId" class="input" type="text" placeholder="예: @yourid" />
            </div>
          </div>

          <div style="display:flex; gap:10px; margin-top:14px; justify-content:flex-end; flex-wrap:wrap;">
            <button class="btn secondary" id="btnLoad">불러오기</button>
            <button class="btn primary" id="btnSave">저장</button>
          </div>
        </section>

        <!-- 결제수단 안내 -->
        <div class="panel" style="padding:14px; display:flex; justify-content:space-between; align-items:center; flex-wrap:wrap; gap:10px;">
          <div>
            <div style="font-size:14px; font-weight:600; margin-bottom:4px;">결제수단 관리</div>
            <div class="muted" style="font-size:13px;">한국/베트남 계좌, QR 등 결제수단은 별도 페이지에서 관리합니다.</div>
          </div>
          <a class="btn primary" href="/payment-methods.html">결제수단 관리 →</a>
        </div>

      </div>
    </main>

    <div id="site-footer"></div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/ethers@6.14.0/dist/ethers.umd.min.js"></script>
  <script src="/assets/js/secrets.js"></script>
  <script src="/assets/js/config.js"></script>
  <script type="module" src="/assets/js/firebase.js"></script>
  <script src="/assets/js/partials.js"></script>
  <script type="module">
    await window.loadPartials();
    await import("/assets/js/header-wallet.js");
  </script>
  <script type="module" src="/assets/js/pages/profile.js"></script>
</body>
</html>
